<li appHighlightCompletedTodo [isCompleted]="todo().completed" class="todos__items">
    <input id="todo-{{ todo().id }}" type="checkbox" [checked]="todo().completed" 
    (change)="this.todoClicked()">
    <!--(change) is an Ng event binding that listens to the standard HTML change event 
    on an input checkbox element. -->
    <label for="todo-{{ todo().id }}">{{todo().title}}</label>
</li>
